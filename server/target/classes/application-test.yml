spring:
  datasource:
    url: jdbc:mysql://test-server:3306/b1_test?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:b1_test}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:test-server}
      port: 6379
      database: 1
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration

b1:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://test-server:9000}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    secure: false
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com/v1
      model: deepseek-chat

logging:
  level:
    root: INFO
    com.b1: INFO
